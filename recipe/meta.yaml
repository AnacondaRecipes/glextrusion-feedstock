{% set name = "glextrusion" %}
{% set version = "3.1.2" %}
package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/linas/glextrusion/archive/refs/tags/gle-3.1.2.tar.gz
  sha256: a477d229ceae5d06aba61a68233cf2a460b966982861d5cc9642fc99374cf460

build:
  number: 0
  skip: True  # [not win]

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - ucrt64-headers-git



about:
  home: https://www.linas.org/gle
  license: LGPL-2
  license_family: GPL
  license_file: COPYING
  summary: GLE - The GL Extrusion Library
  description: |
    GLE is a library package of C functions that draw extruded surfaces, including surfaces of revolution, sweeps, tubes, polycones, polycylinders and helicoids. 
    Generically, the extruded surface is specified with a 2D polyline that is extruded along a 3D path. 
    A local coordinate system allows for additional flexibility in the primitives drawn. 
    Extrusions may be texture mapped in a variety of ways. The GLE library generates 3D triangle coordinates, lighting normal vectors and texture coordinates as output. 
    GLE uses the GL or OpenGL(R) API's to perform the actual rendering. The demos use GLUT and require GLUT to be installed.
  doc_url: https://www.linas.org/gle
  dev_url: https://github.com/linas/glextrusion

extra:
  recipe-maintainers:
    - aosipov
